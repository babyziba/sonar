name: tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Tests cover only the pure-logic modules (geometry, distance,
      # narration, tracking) so installing the heavy ML runtime deps from
      # requirements.txt is unnecessary. requirements-dev.txt is enough.
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v
